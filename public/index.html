<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiWonHyeok | Home</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/" class="active">Home</a>
            <a href="/study">Study</a>
            <a href="/guestbook">Guestbook</a>
            <span id="login-link"><a href="/login">Login</a></span>
        </div>
    </nav>
 
    <header class="hero">
        <div class="hero-content">
            <p class="hero-sub">안녕하세요 👋</p>
            <h1 class="hero-title">최원혁입니다</h1>
            <p class="hero-desc">백엔드 개발자를 꿈꾸는 학생입니다.</p>
            <div class="hero-btns">
                <button class="submit-btn" onclick="location.href='/study'">공부 기록 보기</button>
                <button class="submit-btn btn-outline" onclick="location.href='/guestbook'">방명록 남기기</button>
            </div>
        </div>
    </header>
 
    <section class="container">
        <div class="page-header">
            <div>
                <h2>GitHub</h2>
                <p class="page-sub">코드 활동 현황</p>
            </div>
            <a id="github-profile-link" href="https://github.com/cwh54321" target="_blank" class="submit-btn btn-outline">프로필 보기</a>
        </div>

        <div id="github-profile" class="github-profile-card">
            <div class="github-avatar-wrap">
                <img id="gh-avatar" src="" alt="avatar" class="github-avatar">
            </div>
            <div class="github-info">
                <div id="gh-name" class="github-name"></div>
                <div id="gh-bio" class="github-bio"></div>
                <div class="github-stats">
                    <div class="github-stat"><span id="gh-repos">-</span><span>레포지터리</span></div>
                    <div class="github-stat"><span id="gh-followers">-</span><span>팔로워</span></div>
                    <div class="github-stat"><span id="gh-following">-</span><span>팔로잉</span></div>
                </div>
            </div>
        </div>

        <div id="github-repos" class="grid"></div>
    </section>

    <script src="/auth.js"></script>
    <script>
        const GITHUB_USER = 'cwh54321';
        const LANG_COLORS = {
            JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
            Java: '#b07219', HTML: '#e34c26', CSS: '#563d7c',
            'C++': '#f34b7d', C: '#555555', Go: '#00ADD8',
            Rust: '#dea584', Ruby: '#701516', Shell: '#89e051',
            Kotlin: '#A97BFF', Swift: '#ffac45', Vue: '#41b883',
        };

        async function loadGithub() {
            try {
                const [user, repos] = await Promise.all([
                    fetch(`https://api.github.com/users/${GITHUB_USER}`).then(r => r.json()),
                    fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=stars&per_page=6`).then(r => r.json()),
                ]);

                document.getElementById('gh-avatar').src = user.avatar_url;
                document.getElementById('gh-name').textContent = user.name || user.login;
                document.getElementById('gh-bio').textContent = user.bio || '';
                document.getElementById('gh-repos').textContent = user.public_repos;
                document.getElementById('gh-followers').textContent = user.followers;
                document.getElementById('gh-following').textContent = user.following;

                const grid = document.getElementById('github-repos');
                grid.innerHTML = repos.filter(r => !r.fork).slice(0, 6).map(repo => {
                    const color = LANG_COLORS[repo.language] || '#555';
                    const lang = repo.language
                        ? `<span class="repo-lang"><span class="lang-dot" style="background:${color}"></span>${repo.language}</span>`
                        : '';
                    return `
                        <a class="card repo-card" href="${repo.html_url}" target="_blank">
                            <div class="repo-header">
                                <svg class="repo-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
                                <h3 class="repo-name">${repo.name}</h3>
                            </div>
                            <p class="repo-desc">${repo.description || '설명 없음'}</p>
                            <div class="repo-meta">
                                ${lang}
                                <span class="repo-stars">⭐ ${repo.stargazers_count}</span>
                            </div>
                        </a>`;
                }).join('');
            } catch (e) {
                document.getElementById('github-repos').innerHTML = '<p style="color:#555">GitHub 데이터를 불러올 수 없습니다.</p>';
            }
        }

        loadGithub();
    </script>
</body>
</html>
