<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChoiWonHyeok | Home</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { font-size: 1.5rem; font-weight: bold; color: #00ff88; text-decoration: none; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover { color: #00ff88; }
        .nav-links a.active { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/" class="active">Home</a>
            <a href="/study">Study</a>
            <a href="/guestbook">Guestbook</a>
            <span id="login-link"><a href="/login">Login</a></span>
        </div>
    </nav>

    <header style="height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <h1>안녕하세요 최원혁입니다</h1>
        <p>백엔드 개발자를 꿈꾸는 학생의 포트폴리오입니다.</p>
        <button class="submit-btn" onclick="location.href='/study'" style="margin-top: 30px; padding: 15px 30px; background: #00ff88; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">공부 기록 보기</button>
    </header>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/check-auth');
            const data = await res.json();
            const loginLink = document.getElementById('login-link');
            if (data.isLoggedIn) {
                loginLink.innerHTML = `<a href="#" onclick="handleLogout()">Logout</a>`;
            }
        }
        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            location.reload();
        }
        checkAuth();
    </script>
</body>
</html>
