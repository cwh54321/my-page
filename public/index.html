<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChoiWonHyeok | Home</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* 네비게이션 바 스타일 (style.css에 추가해도 됩니다) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo { font-size: 1.5rem; font-weight: bold; color: #fff; text-decoration: none; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover { color: #00ff88; }
        .nav-links a.active { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/" class="active">Home</a>
            <a href="/study">Study</a>
            <a href="/guestbook">Guestbook</a>
        </div>
    </nav>

    <header style="height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1>안녕하세요 최원혁입니다</h1>
        <p>백엔드 개발자를 꿈꾸는 2학년 4반 학생입니다.</p>
        <div style="margin-top: 30px;">
            <button class="submit-btn" onclick="location.href='/study'">공부 기록 보기</button>
        </div>
    </header>
</body>
<script>
    // 상단 네비게이션 및 권한 UI 제어 함수
async function checkLoginStatus() {
    const res = await fetch('/api/check-auth');
    const data = await res.json();
    
    const loginLink = document.getElementById('login-link'); // 네비게이션의 로그인 링크
    const writeBtn = document.getElementById('write-btn');   // 스터디 페이지의 글쓰기 버튼
    const adminBtns = document.querySelector('.admin-btns'); // 상세 페이지의 수정/삭제 버튼 그룹

    if (data.isLoggedIn) {
        // 로그인 상태일 때
        if(loginLink) loginLink.innerHTML = `<a href="#" onclick="logout()">Logout</a>`;
        if(writeBtn) writeBtn.style.display = 'block';
        if(adminBtns) adminBtns.style.display = 'flex';
    } else {
        // 로그아웃 상태일 때
        if(writeBtn) writeBtn.style.display = 'none';
        if(adminBtns) adminBtns.style.display = 'none';
    }
}

async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    location.reload();
}

// 페이지 로드 시 실행
checkLoginStatus();
</script>
</html>
