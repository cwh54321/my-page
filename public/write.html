<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Write | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h2>새 공부 기록 작성</h2>
        <input type="text" id="title" placeholder="제목" class="input-field">
        <input type="text" id="category" placeholder="카테고리" class="input-field">
        <input type="file" id="image" class="input-field">
        <textarea id="content" placeholder="내용" class="input-field" style="height:300px;"></textarea>
        <button onclick="save()" class="submit-btn" style="width:100%;">기록하기</button>
    </div>
    <script>
        async function save() {
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('content', document.getElementById('content').value);
            formData.append('image', document.getElementById('image').files[0]);
    
            const res = await fetch('/add-study', { method: 'POST', body: formData });
            if(res.ok) location.href = '/study';
            else alert("작성 권한이 없습니다.");
        }
    </script>
</body>
</html>
