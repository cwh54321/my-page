<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Study | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/study" class="active">Study</a>
            <a href="/guestbook">Guestbook</a>
            <span id="login-link"><a href="/login">Login</a></span>
        </div>
    </nav>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Study Logs</h2>
            <button id="write-btn" class="submit-btn" style="display:none;" onclick="location.href='/write'">+ 기록하기</button>
        </div>
        <div id="study-list" class="grid"></div>
    </div>
    <script>
        async function load() {
            const res = await fetch('/studies');
            const data = await res.json();
            document.getElementById('study-list').innerHTML = data.map(s => `
                <div class="card">
                    <h3>${s.title}</h3>
                    <p>${s.category}</p>
                </div>
            `).join('');

            const authRes = await fetch('/api/check-auth');
            const authData = await authRes.json();
            if (authData.isLoggedIn) {
                document.getElementById('login-link').innerHTML = `<a href="#" onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.reload())">Logout</a>`;
                if (authData.userId === "cwh12345") {
                    document.getElementById('write-btn').style.display = 'block';
                }
            }
        }
        load();
    </script>
</body>
</html>
