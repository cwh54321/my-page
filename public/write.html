<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Write | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h2>새 공부 기록</h2>
        <input type="text" id="title" placeholder="제목" style="width:100%; padding:10px; margin:10px 0; background:#1a1a1a; color:#fff; border:1px solid #333;">
        <input type="text" id="category" placeholder="카테고리" style="width:100%; padding:10px; margin:10px 0; background:#1a1a1a; color:#fff; border:1px solid #333;">
        <textarea id="content" placeholder="내용" style="width:100%; height:200px; padding:10px; background:#1a1a1a; color:#fff; border:1px solid #333;"></textarea>
        <button onclick="save()" class="submit-btn" style="width:100%; margin-top:10px;">저장</button>
    </div>
    <script>
        async function save() {
            const res = await fetch('/add-study', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    content: document.getElementById('content').value
                })
            });
            if(res.ok) { alert("저장됨!"); location.href='/study'; }
            else { alert("권한이 없습니다."); }
        }
    </script>
</body>
</html>
