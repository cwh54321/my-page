<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Guestbook | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/study">Study</a>
            <a href="/guestbook" class="active">Guestbook</a>
            <span id="login-link"><a href="/login">Login</a></span>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h2>Guestbook</h2>
        
        <div id="guest-form" style="display: none; margin-bottom: 40px; background: #1a1a1a; padding: 20px; border-radius: 15px;">
            <p id="user-info" style="color: #00ff88; margin-bottom: 10px;"></p>
            <textarea id="content" placeholder="방명록을 남겨주세요!" style="width: 100%; height: 100px; background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px;"></textarea>
            <button onclick="addPost()" class="submit-btn" style="width: 100%; margin-top: 10px;">등록하기</button>
        </div>

        <div id="login-msg" style="text-align: center; padding: 20px; border: 1px dashed #333; border-radius: 15px; margin-bottom: 40px;">
            <p style="color: #888;">방명록을 남기려면 <a href="/login" style="color: #00ff88;">로그인</a>이 필요합니다.</p>
        </div>

        <div id="posts-list"></div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/check-auth');
            const data = await res.json();
            
            if (data.isLoggedIn) {
                document.getElementById('login-link').innerHTML = `<a href="#" onclick="handleLogout()">Logout</a>`;
                document.getElementById('guest-form').style.display = 'block';
                document.getElementById('login-msg').style.display = 'none';
                document.getElementById('user-info').innerText = `작성자: ${data.userId}`;
            }
        }

        async function addPost() {
            const content = document.getElementById('content').value;
            const res = await fetch('/add-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            if(res.ok) { location.reload(); }
        }

        async function loadPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            const auth = await fetch('/api/check-auth').then(r => r.json());
        
            document.getElementById('posts-list').innerHTML = posts.map(p => {
                // 본인 글이거나 관리자(cwh12345)일 때 삭제 버튼 노출
                const canDelete = auth.isLoggedIn && (auth.userId === p.nickname || auth.userId === "cwh12345");
                
                return `
                    <div style="border-bottom: 1px solid #333; padding: 15px 0;">
                        <strong style="color: #00ff88;">${p.nickname}</strong>
                        <p>${p.content}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <small style="color:#555;">${new Date(p.date).toLocaleString()}</small>
                            ${canDelete ? `<button onclick="deletePost('${p._id}')" style="color:#ff4444; background:none; border:none; cursor:pointer;">삭제</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function deletePost(id) {
            if(confirm("정말 삭제할까요?")) {
                const res = await fetch(`/api/post/${id}`, { method: 'DELETE' });
                if(res.ok) location.reload();
            }
        }
        loadPosts();

        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            location.reload();
        }

        checkAuth();
    </script>
</body>
</html>
