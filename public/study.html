<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Study | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/study" class="active">Study</a>
            <a href="/guestbook">Guestbook</a>
            <span id="login-link"><a href="/login">Login</a></span>
        </div>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2 style="font-size: 2rem;">Study Logs</h2>
            <button id="write-btn" class="write-btn" style="display: none;" onclick="location.href='/register'">+ 기록하기</button>
        </div>
        <div id="study-list" class="grid"></div>
    </div>

    <script>
        async function loadStudies() {
            const res = await fetch('/studies');
            const data = await res.json();
            document.getElementById('study-list').innerHTML = data.map(s => `
                <div class="card" onclick="location.href='/study/${s._id}'">
                    <span class="tag">${s.category}</span>
                    <h3 style="margin: 15px 0 10px 0;">${s.title}</h3>
                    <small style="color: #666;">${new Date(s.date).toLocaleDateString()}</small>
                </div>
            `).join('');
        }
        loadStudies();
    </script>
    <script src="/auth.js"></script>
</body>
</html>
