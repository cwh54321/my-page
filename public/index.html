<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .post-item { background: #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .edit-btn { background: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>최원혁의 방명록</h1>
    <form onsubmit="addPost(event)">
        <input type="text" id="nickname" placeholder="작성자" required>
        <input type="text" id="content" placeholder="내용" required>
        <button type="submit">등록</button>
    </form>
    <div id="post-list" style="margin-top:20px;"></div>

    <script>
        // 1. 글 목록 불러오기 (수정 버튼만 살짝 추가)
        async function loadPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            const list = document.getElementById('post-list');
            list.innerHTML = '';
    
            posts.forEach(post => {
                const item = document.createElement('div');
                // 원혁님이 만든 기존 CSS 클래스가 있다면 여기에 추가하세요 (예: item.className = 'post')
                item.style.marginBottom = "10px"; 
                item.innerHTML = `
                    <strong>${post.nickname}</strong>: <span>${post.content}</span>
                    <button onclick="editPost('${post._id}')" style="margin-left:10px; cursor:pointer;">수정</button>
                `;
                list.appendChild(item);
            });
        }
    
        // 2. 글 등록 (화면 유지의 핵심!)
        async function addPost(e) {
            e.preventDefault(); // 이게 있어야 페이지가 안 올라가요!
            
            const nickname = document.getElementById('nickname').value;
            const content = document.getElementById('content').value;
    
            await fetch('/add-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content })
            });
    
            document.getElementById('content').value = ''; // 입력창만 비우기
            loadPosts(); // 목록 새로고침
        }
    
        // 3. 수정 기능
        async function editPost(id) {
            const newContent = prompt("수정할 내용을 입력하세요:");
            if (newContent) {
                await fetch(`/edit-post/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: newContent })
                });
                loadPosts();
            }
        }
    
        loadPosts(); // 시작하자마자 실행
    </script>
</body>
</html>
