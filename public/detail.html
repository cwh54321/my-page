<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Study Detail</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 15%;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
        }

        .detail-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            color: #fff;
        }

        .admin-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-edit {
            background: none;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-delete {
            background: none;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .study-image {
            width: 100%;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }

        #content-view {
            line-height: 1.8;
            color: #ddd;
        }
    </style>
</head>

<body>
    <nav><a href="/" style="color:#00ff88; font-weight:bold; text-decoration:none;">ChoiWonHyeok</a></nav>
    <div class="detail-container">
        <div id="category-tag" class="tag"
            style="color:#00ff88; border:1px solid #333; padding:5px 10px; border-radius:15px; display:inline-block;">
        </div>
        <h1 id="title" style="font-size: 2.5rem; margin: 10px 0;"></h1>
        <div id="date" style="color: #666; margin-bottom: 20px;"></div>
        <div id="admin-controls" class="admin-btns" style="display: none;">
            <button class="btn-edit" onclick="editStudy()">수정</button>
            <button class="btn-delete" onclick="deleteStudy()">삭제</button>
        </div>
        <img id="main-image" class="study-image">
        <div id="content-view"></div>
        <button class="submit-btn" style="margin-top: 50px; background: #333;"
            onclick="location.href='/study'">목록으로</button>
    </div>
    <script>
        let studyId = window.location.pathname.split('/').pop();
        let currentData = {};
        async function load() {
            const res = await fetch(`/api/study/${studyId}`);
            currentData = await res.json();
            document.getElementById('title').innerText = currentData.title;
            document.getElementById('category-tag').innerText = currentData.category;
            document.getElementById('date').innerText = new Date(currentData.date).toLocaleDateString();
            if (currentData.imageUrl) { const img = document.getElementById('main-image'); img.src = currentData.imageUrl; img.style.display = 'block'; }
            document.getElementById('content-view').innerHTML = marked.parse(currentData.content || '');
        }
        async function deleteStudy() { if (confirm("삭제할까요?")) { await fetch(`/api/study/${studyId}`, { method: 'DELETE' }); location.href = '/study'; } }
        async function editStudy() {
            const t = prompt("제목 수정:", currentData.title);
            const c = prompt("내용 수정:", currentData.content);
            if (t && c) { await fetch(`/api/study/${studyId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: t, content: c }) }); location.reload(); }
        }
        load();

        // 상단 네비게이션 및 권한 UI 제어 함수
        async function checkLoginStatus() {
            const res = await fetch('/api/check-auth');
            const data = await res.json();

            const loginLink = document.getElementById('login-link'); // 네비게이션의 로그인 링크
            const writeBtn = document.getElementById('write-btn');   // 스터디 페이지의 글쓰기 버튼
            const adminBtns = document.querySelector('.admin-btns'); // 상세 페이지의 수정/삭제 버튼 그룹

            if (data.isLoggedIn) {
                // 로그인 상태일 때
                if (loginLink) loginLink.innerHTML = `<a href="#" onclick="logout()">Logout</a>`;
                if (writeBtn) writeBtn.style.display = 'block';
                if (adminBtns) adminBtns.style.display = 'flex';
            } else {
                // 로그아웃 상태일 때
                if (writeBtn) writeBtn.style.display = 'none';
                if (adminBtns) adminBtns.style.display = 'none';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            location.reload();
        }

        async function checkAdmin() {
            const res = await fetch('/api/check-auth');
            const data = await res.json();
            if (data.isLoggedIn) {
                document.getElementById('admin-controls').style.display = 'flex';
            }
        }
        checkAdmin();

        // 페이지 로드 시 실행
        checkLoginStatus();
    </script>
</body>

</html>
