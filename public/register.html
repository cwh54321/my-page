<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-container { max-width: 400px; margin: 100px auto; padding: 40px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        input:focus { border-color: #00ff88; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .switch-link { margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 style="color: #00ff88; margin-bottom: 30px;">Admin Register</h2>
        <input type="text" id="userId" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button class="auth-btn" onclick="handleLogin()">로그인</button>
        <a href="/register.html" class="switch-link">계정이 없으신가요? 회원가입</a>
    </div>

    <script>
        async function handleLogin() {
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password })
            });
            
            const data = await res.json();
            if(data.ok) {
                alert("로그인 성공!");
                location.href = '/study'; // 로그인 후 이동할 페이지
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
