<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .post-item { background: #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .edit-btn { background: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>최원혁의 방명록</h1>
    <form onsubmit="addPost(event)">
        <input type="text" id="nickname" placeholder="작성자" required>
        <input type="text" id="content" placeholder="내용" required>
        <button type="submit">등록</button>
    </form>
    <div id="post-list" style="margin-top:20px;"></div>

    <script>
        async function loadPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            document.getElementById('post-list').innerHTML = posts.map(p => `
                <div class="post-item">
                    <div><strong>${p.nickname}</strong>: ${p.content}</div>
                    <button class="edit-btn" onclick="editPost('${p._id}')">수정</button>
                </div>
            `).join('');
        }
        async function addPost(e) {
            e.preventDefault();
            const nickname = document.getElementById('nickname').value;
            const content = document.getElementById('content').value;
            await fetch('/add-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content })
            });
            document.getElementById('content').value = '';
            loadPosts();
        }
        async function editPost(id) {
            const newContent = prompt("수정할 내용:");
            if (newContent) {
                await fetch(`/edit-post/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: newContent })
                });
                loadPosts();
            }
        }
        loadPosts();
    </script>
</body>
</html>
