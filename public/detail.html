<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Study Detail</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 15%; background: #000; border-bottom: 1px solid #1a1a1a; }
        .nav-logo { font-size: 1.4rem; font-weight: bold; color: #00ff88; text-decoration: none; }
        
        .detail-container { max-width: 800px; margin: 50px auto; padding: 0 20px; color: #fff; }
        .detail-header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .detail-title { font-size: 2.5rem; margin-bottom: 10px; }
        .detail-meta { color: #888; font-size: 0.9rem; }
        
        .study-image { width: 100%; border-radius: 15px; margin-bottom: 30px; display: none; }
        
        /* 마크다운 스타일링 */
        #content-view { line-height: 1.8; font-size: 1.1rem; color: #ddd; }
        #content-view h1, #content-view h2 { color: #00ff88; margin-top: 30px; }
        #content-view code { background: #333; padding: 2px 6px; border-radius: 4px; color: #ff79c6; }
        #content-view pre { background: #1a1a1a; padding: 20px; border-radius: 10px; overflow-x: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
    </nav>

    <div class="detail-container">
        <div class="detail-header">
            <div id="category-tag" class="tag" style="display:inline-block; margin-bottom:10px;"></div>
            <h1 id="title" class="detail-title">로딩 중...</h1>
            <div id="date" class="detail-meta"></div>
        </div>

        <img id="main-image" class="study-image" alt="study image">
        
        <div id="content-view">
            </div>

        <button class="submit-btn" style="margin-top: 50px; background: #333;" onclick="history.back()">뒤로 가기</button>
    </div>

    <script>
        async function loadDetail() {
            // URL에서 ID 추출 (예: /study/65fc...)
            const id = window.location.pathname.split('/').pop();
            const res = await fetch(`/api/study/${id}`);
            const study = await res.json();

            document.getElementById('title').innerText = study.title;
            document.getElementById('category-tag').innerText = study.category;
            document.getElementById('date').innerText = new Date(study.date).toLocaleDateString();
            
            // 이미지 있으면 표시
            if(study.imageUrl) {
                const img = document.getElementById('main-image');
                img.src = study.imageUrl;
                img.style.display = 'block';
            }

            // 마크다운 변환
            document.getElementById('content-view').innerHTML = marked.parse(study.content || '');
        }
        loadDetail();
    </script>
</body>
</html>
