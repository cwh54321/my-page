<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-item { border-bottom: 1px solid #333; padding: 15px 0; margin-bottom: 10px; }
        .edit-btn { 
            background: none; border: 1px solid #00ff88; color: #00ff88; 
            padding: 2px 8px; cursor: pointer; font-size: 11px; margin-left: 10px; border-radius: 4px;
        }
        .edit-btn:hover { background: #00ff88; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>안녕하세요 저는 2학년 4반 최원혁 입니다</h1>
        <p>저는 백엔드에 관심이 있습니다</p>

        <div class="card">
            <h3>방명록 남기기</h3>
            <form onsubmit="addPost(event)">
                <input type="text" id="nickname" placeholder="작성자">

<textarea id="content" placeholder="내용"></textarea>

<button type="submit">등록하기</button>
            </form>
        </div>

        <<div class="card recent-posts">
            <h3>최근 게시물</h3>
            <div id="post-list" class="posts-container">
                </div>
        </div>
    </div>

    <script>
        // 1. 게시글 목록 불러오기 (원혁님의 디자인 구조 그대로 구현)
        async function loadPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            const list = document.getElementById('post-list'); // 최근 게시물 아래 div ID
            list.innerHTML = ''; // 기존 내용 지우기
    
            posts.forEach(post => {
                // 원혁님의 디자인 구조 (div 안에 span 두 개)
                const item = document.createElement('div');
                // item.style = "..."; // 혹시 div에 특별한 스타일이 있다면 여기에 추가
    
                item.innerHTML = `
                    <span class="author">${post.nickname}</span> | 
                    <span class="content">${post.content}</span>
                    <button onclick="editPost('${post._id}')" style="background:none; border:none; color:#0f0; cursor:pointer; font-size:10px; margin-left:5px;">[수정]</button>
                `;
                list.appendChild(item);
            });
        }
    
        // 2. 글 등록 (화면 유지의 핵심!)
        async function addPost(e) {
            e.preventDefault(); // ✅ 이게 있어야 페이지가 위로 안 튕깁니다!
            
            const nickname = document.getElementById('nickname').value; // 작성자 input ID
            const content = document.getElementById('content').value;   // 내용 textarea ID
    
            await fetch('/add-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content })
            });
    
            document.getElementById('content').value = ''; // 내용창만 싹 비우기
            loadPosts(); // 목록만 다시 불러오기
        }
    
        // 3. 수정 기능 함수
        async function editPost(id) {
            const newContent = prompt("수정할 내용을 입력하세요:");
            if (newContent && newContent.trim() !== "") {
                await fetch(`/edit-post/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: newContent })
                });
                loadPosts(); // 수정 후 목록 새로고침
            }
        }
    
        // 페이지가 켜지자마자 목록 불러오기 실행
        loadPosts();
    </script>
</body>
</html>
