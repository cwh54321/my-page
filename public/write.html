<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .editor-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .editor-pane { background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .pane-label { padding: 10px 16px; background: #1a1a1a; color: #888; font-size: 0.85rem; border-bottom: 1px solid #333; }
        #md-input { width: 100%; height: 420px; background: #111; color: #eee; border: none; padding: 16px; font-family: 'Consolas', monospace; font-size: 0.9rem; resize: none; outline: none; }
        #md-preview { height: 420px; padding: 16px; overflow-y: auto; color: #ddd; font-size: 0.9rem; line-height: 1.8; }
        .input-field { width: 100%; padding: 13px 16px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 14px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .input-field:focus { border-color: #00ff88; }
        .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 8px; display: none; }
        @media (max-width: 700px) { .editor-wrap { grid-template-columns: 1fr; } }
        /* 마크다운 프리뷰 스타일 */
        #md-preview h1,#md-preview h2,#md-preview h3 { color: #00ff88; margin: 16px 0 8px; }
        #md-preview code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
        #md-preview pre { background: #1a1a1a; padding: 12px; border-radius: 8px; overflow-x: auto; }
        #md-preview blockquote { border-left: 3px solid #00ff88; padding-left: 12px; color: #888; }
        #md-preview a { color: #00ff88; }
        #md-preview img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/study">Study</a>
            <a href="/guestbook">Guestbook</a>
            <span id="login-link"></span>
        </div>
    </nav>
 
    <div class="container" style="max-width:1100px;">
        <div class="page-header">
            <div>
                <h2>새 공부 기록</h2>
                <p class="page-sub">마크다운으로 작성하세요</p>
            </div>
            <div style="display:flex;gap:10px;">
                <button onclick="location.href='/study'" class="submit-btn btn-outline">취소</button>
                <button onclick="save()" class="submit-btn" id="save-btn">기록하기</button>
            </div>
        </div>
 
        <input type="text" id="title" placeholder="제목을 입력하세요" class="input-field" style="font-size:1.1rem;">
        <input type="text" id="category" placeholder="카테고리 (예: JavaScript, CS, Algorithm)" class="input-field">
 
        <div style="margin-bottom:14px;">
            <label style="color:#888; font-size:0.9rem; display:block; margin-bottom:8px;">대표 이미지 (선택)</label>
            <input type="file" id="image" accept="image/*" class="input-field" onchange="previewImg(this)" style="cursor:pointer;">
            <img id="img-preview" class="img-preview" alt="미리보기">
        </div>
 
        <div class="editor-wrap">
            <div class="editor-pane">
                <div class="pane-label">✏️ 마크다운 작성</div>
                <textarea id="md-input" placeholder="# 오늘의 공부&#10;&#10;## 배운 것&#10;- 항목 1&#10;- 항목 2&#10;&#10;```js&#10;console.log('hello')&#10;```" oninput="updatePreview()"></textarea>
            </div>
            <div class="editor-pane">
                <div class="pane-label">👁 미리보기</div>
                <div id="md-preview"></div>
            </div>
        </div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 관리자 체크
        (async () => {
            const auth = await fetch('/api/check-auth').then(r => r.json());
            if (!auth.isAdmin) { alert("관리자만 접근 가능합니다."); location.href = '/study'; return; }
            document.getElementById('login-link').innerHTML = `<a href="#" onclick="logout()">Logout</a>`;
        })();
 
        function updatePreview() {
            const md = document.getElementById('md-input').value;
            document.getElementById('md-preview').innerHTML = marked.parse(md);
        }
 
        function previewImg(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('img-preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
 
        async function getBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.onerror = rej;
                reader.readAsDataURL(file);
            });
        }
 
        async function save() {
            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value.trim();
            const content = document.getElementById('md-input').value.trim();
 
            if (!title) { alert("제목을 입력해주세요."); return; }
            if (!content) { alert("내용을 입력해주세요."); return; }
 
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.textContent = '저장 중...';
 
            let imageBase64 = '';
            const imgFile = document.getElementById('image').files[0];
            if (imgFile) {
                if (imgFile.size > 2 * 1024 * 1024) { alert("이미지는 2MB 이하만 가능합니다."); btn.disabled = false; btn.textContent = '기록하기'; return; }
                imageBase64 = await getBase64(imgFile);
            }
 
            const res = await fetch('/add-study', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, category, content, imageBase64 })
            });
 
            if (res.ok) {
                location.href = '/study';
            } else {
                alert("저장 실패. 다시 시도해주세요.");
                btn.disabled = false; btn.textContent = '기록하기';
            }
        }
 
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            location.href = '/';
        }
    </script>
</body>
</html>
