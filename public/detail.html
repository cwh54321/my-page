<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav><a href="/" class="nav-logo">ChoiWonHyeok</a></nav>
    <div class="container">
        <h1 id="title"></h1>
        <div id="img-area" style="margin:20px 0;"></div>
        <p id="content" style="white-space:pre-wrap;"></p>
        
        <div id="admin-menu" style="display:none; margin-top:50px; gap:10px;">
            <button onclick="deletePost()" class="submit-btn" style="background:#ff4444;">삭제하기</button>
        </div>
    </div>

    <script>
        const id = location.pathname.split('/').pop();

        async function load() {
            const res = await fetch(`/api/study/${id}`);
            const s = await res.json();
            document.getElementById('title').innerText = s.title;
            document.getElementById('content').innerText = s.content;
            if(s.imageUrl) document.getElementById('img-area').innerHTML = `<img src="${s.imageUrl}" style="max-width:100%; border-radius:10px;">`;

            const auth = await fetch('/api/check-auth').then(r => r.json());
            if(auth.userId === "cwh12345") document.getElementById('admin-menu').style.display = 'flex';
        }

        async function deletePost() {
            if(confirm("삭제하시겠습니까?")) {
                await fetch(`/api/study/${id}`, { method: 'DELETE' });
                location.href = '/study';
            }
        }
        load();
    </script>
</body>
</html>
