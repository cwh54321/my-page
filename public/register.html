<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Register | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-container { max-width: 400px; margin: 100px auto; padding: 40px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 15px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 style="color: #00ff88; margin-bottom: 30px;">Admin Register</h2>
        <input type="text" id="userId" placeholder="새 아이디">
        <input type="password" id="password" placeholder="새 비밀번호">
        <button class="auth-btn" onclick="handleRegister()">회원가입</button>
        <a href="/login" style="margin-top:20px; display:block; color:#888; text-decoration:none;">이미 계정이 있나요? 로그인</a>
    </div>

    <script>
        async function handleRegister() {
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password })
            });
            
            const data = await res.json();
            if(data.ok) {
                alert("회원가입 성공! 이제 로그인해주세요.");
                location.href = '/login';
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
