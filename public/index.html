<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .post-item { border-bottom: 1px solid #333; padding: 15px 0; margin-bottom: 10px; }
        .edit-btn { 
            background: none; border: 1px solid #00ff88; color: #00ff88; 
            padding: 2px 8px; cursor: pointer; font-size: 11px; margin-left: 10px; border-radius: 4px;
        }
        .edit-btn:hover { background: #00ff88; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>안녕하세요 저는 2학년 4반 최원혁 입니다</h1>
        <p>저는 백엔드에 관심이 있습니다</p>

        <div class="card">
            <h3>방명록 남기기</h3>
            <form onsubmit="addPost(event)">
                <input type="text" id="nickname" placeholder="작성자" required>
                <textarea id="content" placeholder="응원 한마디!" required></textarea>
                <button type="submit">등록하기</button>
            </form>
        </div>

        <div class="card">
            <h3>최근 게시물</h3>
            <div id="post-list">
                </div>
        </div>
    </div>

    <script>
        // 1. 게시글 불러오기
        async function loadPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            const list = document.getElementById('post-list');
            list.innerHTML = '';

            posts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'post-item';
                // 원혁님 디자인에 맞춰 날짜 형식도 넣었습니다
                const dateStr = new Date(post.date).toLocaleString();
                
                item.innerHTML = `
                    <div style="color: #00ff88; font-weight: bold; margin-bottom: 5px;">${post.nickname}</div>
                    <div style="color: #fff;">${post.content}</div>
                    <div style="font-size: 11px; color: #666; margin-top: 5px;">
                        ${dateStr}
                        <button class="edit-btn" onclick="editPost('${post._id}')">수정</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // 2. 게시글 등록 (화면 유지)
        async function addPost(e) {
            e.preventDefault(); // 페이지 새로고침 방지!
            
            const nickname = document.getElementById('nickname').value;
            const content = document.getElementById('content').value;

            await fetch('/add-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content })
            });

            document.getElementById('content').value = ''; // 입력창만 비우기
            loadPosts(); // 목록 새로고침
        }

        // 3. 게시글 수정
        async function editPost(id) {
            const newContent = prompt("수정할 내용을 입력하세요:");
            if (newContent && newContent.trim() !== "") {
                await fetch(`/edit-post/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: newContent })
                });
                loadPosts();
            }
        }

        // 시작 시 실행
        loadPosts();
    </script>
</body>
</html>
