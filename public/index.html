<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>안녕하세요 저는 2학년 4반 최원혁 입니다</h1>
        <p>저는 백엔드에 관심이 있습니다</p>

        <div class="card">
            <h3>방명록 남기기</h3>
            <form action="/add-post" method="POST">
                <input type="text" name="nickname" placeholder="작성자" required>
                <textarea name="content" placeholder="응원 한마디!" required></textarea>
                <button type="submit">등록하기</button>
            </form>
        </div>

        <div class="card recent-posts">
            <h3>최근 게시물</h3>
            <div id="post-list">
                </div>
        </div>
    </div>

    <script>
        // 처음 상태 그대로: 목록만 불러오는 기능
        async function loadPosts() {
            const response = await fetch('/posts');
            const posts = await response.json();
            const list = document.getElementById('post-list');
            list.innerHTML = '';

            posts.forEach(post => {
                const item = document.createElement('div');
                item.style.borderBottom = "1px solid #333";
                item.style.padding = "10px 0";
                item.style.textAlign = "center";
                
                item.innerHTML = `
                    <div style="color: #fff; margin-bottom: 5px;">${post.content}</div>
                    <div style="color: #666; font-size: 12px;">작성자: ${post.nickname}</div>
                `;
                list.appendChild(item);
            });
        }
        loadPosts();
    </script>
</body>
</html>
