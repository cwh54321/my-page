<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ChoiWonHyeok</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 40px; background: #111; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .auth-input { width: 100%; padding: 14px 16px; margin-bottom: 14px; background: #0a0a0a; border: 1px solid #2a2a2a; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .auth-input:focus { border-color: #00ff88; }
        .auth-btn { width: 100%; padding: 14px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .auth-btn:hover { background: #00cc6e; }
        .auth-err { color: #ff4444; font-size: 0.88rem; margin-top: -8px; margin-bottom: 12px; min-height: 20px; }
        .hint { color: #444; font-size: 0.82rem; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">ChoiWonHyeok</a>
    </nav>
    <div class="auth-container">
        <h2 style="color: #00ff88; margin-bottom: 8px;">Register</h2>
        <p style="color:#555; font-size:0.9rem; margin-bottom:28px;">새 계정을 만드세요</p>
        <p class="hint">아이디 (4자 이상)</p>
        <input type="text" id="userId" placeholder="아이디" class="auth-input">
        <p class="hint">비밀번호 (6자 이상)</p>
        <input type="password" id="password" placeholder="비밀번호" class="auth-input">
        <input type="password" id="password2" placeholder="비밀번호 확인" class="auth-input" onkeydown="if(event.key==='Enter') handleRegister()">
        <p id="err-msg" class="auth-err"></p>
        <button class="auth-btn" onclick="handleRegister()" id="reg-btn">회원가입</button>
        <a href="/login" style="display:block; margin-top:20px; color:#555; font-size:0.9rem;">이미 계정이 있나요? <span style="color:#00ff88;">로그인</span></a>
    </div>
 
    <script>
        async function handleRegister() {
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const err = document.getElementById('err-msg');
            const btn = document.getElementById('reg-btn');
 
            if (!userId || !password) { err.textContent = "모든 항목을 입력해주세요."; return; }
            if (userId.length < 4) { err.textContent = "아이디는 4자 이상이어야 합니다."; return; }
            if (password.length < 6) { err.textContent = "비밀번호는 6자 이상이어야 합니다."; return; }
            if (password !== password2) { err.textContent = "비밀번호가 일치하지 않습니다."; return; }
 
            btn.disabled = true; btn.textContent = '처리 중...';
            err.textContent = '';
 
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, password })
            });
            const data = await res.json();
 
            if (data.ok) {
                alert("회원가입 성공! 로그인해주세요.");
                location.href = '/login';
            } else {
                err.textContent = data.message || "회원가입에 실패했습니다.";
                btn.disabled = false; btn.textContent = '회원가입';
            }
        }
    </script>
</body>
</html>
