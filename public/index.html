<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최원혁의 방명록</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div>
            <h1>안녕하세요 저는 2학년 4반 최원혁 입니다</h1>
            <p>저는 백엔드에 관심이 있습니다</p>
        </div>
    </header>

    <div class="board-container">
        
        <section class="write-section">
            <h2>방명록 남기기</h2>
            <form action="/add-post" method="POST">
                <input type="text" name="nickname" placeholder="작성자" required>
                <textarea name="content" placeholder="응원 한마디!" required></textarea>
                <button type="submit" class="submit-btn">등록하기</button>
            </form>
        </section>

        <section class="list-section">
            <h2>최근 게시물</h2>
            <div id="post-list">
                </div>
        </section>
        
    </div>

    <script>
        async function loadPosts() {
            try {
                const response = await fetch('/posts');
                const posts = await response.json();
                const list = document.getElementById('post-list');
                list.innerHTML = '';

                posts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'post-item'; // 원혁님 CSS의 .post-item 적용
                    
                    item.innerHTML = `
                        <div class="post-text">${post.content}</div>
                        <div class="post-info">작성자: ${post.nickname} | ${new Date(post.date).toLocaleString()}</div>
                    `;
                    list.appendChild(item);
                });
            } catch (e) {
                console.error("로딩 실패:", e);
            }
        }
        loadPosts();
    </script>
</body>
</html>
